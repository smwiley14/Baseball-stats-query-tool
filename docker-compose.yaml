services:
  postgres:
    # Use pgvector-enabled PostgreSQL image for vector similarity search
    image: pgvector/pgvector:pg16
    container_name: retrosheet-postgres
    environment:
      POSTGRES_USER: baseball
      POSTGRES_PASSWORD: baseball
      POSTGRES_DB: retrosheet
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/enable_pgvector.sql:/docker-entrypoint-initdb.d/00-enable-pgvector.sql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

      
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - 5051:80
    depends_on:
      - postgres

volumes:
  postgres_data:

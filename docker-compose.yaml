services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: retrosheet-backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      API_KEY: ${API_KEY}
    ports:
      # Bind to localhost only — prevents direct external access, host Nginx still reaches it
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: retrosheet-frontend
    environment:
      # Used by envsubst at container startup to inject key into Nginx config
      API_KEY: ${API_KEY}
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

  postgres:
    # Use pgvector-enabled PostgreSQL image for vector similarity search
    image: pgvector/pgvector:pg16
    container_name: retrosheet-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize from a pg_dump SQL file (runs only on first container init)
      # Put your dump at: ./db/pg_dump.sql
      # If your dump already includes extensions (CREATE EXTENSION ...), you can remove 00-enable-pgvector.sql.
      - ./db/enable_pgvector.sql:/docker-entrypoint-initdb.d/00-enable-pgvector.sql
      - ./db/retrosheet.sql:/docker-entrypoint-initdb.d/01-pg_dump.sql

volumes:
  postgres_data:

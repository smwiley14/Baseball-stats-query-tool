services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: retrosheet-backend
    env_file:
      - ./backend/.env
    ports:
      # Bind to localhost only — prevents direct external access, host Nginx still reaches it
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/baseball/api}
    container_name: retrosheet-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

  postgres:
    # Use pgvector-enabled PostgreSQL image for vector similarity search
    image: pgvector/pgvector:pg16
    container_name: retrosheet-postgres
    env_file:
      # Admin creds (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB) and readonly
      # user creds (POSTGRES_READONLY_USER, POSTGRES_READONLY_PASSWORD) all live here
      - ./backend/.env
    ports:
      # Bind to localhost only — not reachable from the internet
      - "127.0.0.1:5433:5432"
    healthcheck:
      # Waits until Postgres is accepting connections before dependents start
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20      # up to 100s — generous for large SQL dump imports
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize from a pg_dump SQL file (runs only on first container init)
      # Put your dump at: ./db/retrosheet.sql
      # If your dump already includes extensions (CREATE EXTENSION ...), you can remove 00-enable-pgvector.sql.
      - ./db/enable_pgvector.sql:/docker-entrypoint-initdb.d/00-enable-pgvector.sql
      - ./db/retrosheet.sql:/docker-entrypoint-initdb.d/01-pg_dump.sql
      # Creates the read-only application user (runs only on first container init)
      - ./db/02-readonly-user.sh:/docker-entrypoint-initdb.d/02-readonly-user.sh

volumes:
  postgres_data:

# SQL examples for few-shot learning
# Priority: use season views whenever the question is season/career aggregate oriented.
# Views used: all_batting_seasons, qualified_batting_seasons, all_pitching_seasons, qualified_pitching_seasons.

player_season_batting_line:
  question: "What were Aaron Judge's batting stats in 2020?"
  sql: |
    SELECT
      p.first_name,
      p.last_name,
      s.season,
      t.name AS team_name,
      s.plate_appearances,
      s.at_bats,
      s.hits,
      s.home_runs,
      s.rbis,
      s.walks,
      s.strikeouts,
      s.batting_average,
      s.on_base_percentage,
      s.slugging_percentage,
      s.ops
    FROM all_batting_seasons s
    JOIN players p ON s.player_id = p.player_id
    LEFT JOIN teams t ON s.team_id = t.team_id
    WHERE p.first_name = 'Aaron'
      AND p.last_name = 'Judge'
      AND s.season = 2020


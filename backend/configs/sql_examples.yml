player_career_batting_totals:
  question: "What are Mike Trout's career batting totals?"
  sql: |
    SELECT
      p.first_name,
      p.last_name,
      SUM(s.plate_appearances) AS plate_appearances,
      SUM(s.at_bats) AS at_bats,
      SUM(s.hits) AS hits,
      SUM(s.home_runs) AS home_runs,
      SUM(s.rbis) AS rbis,
      SUM(s.walks) AS walks,
      ROUND(SUM(s.hits)::DECIMAL / NULLIF(SUM(s.at_bats), 0), 3) AS career_batting_average,
      ROUND(
        ((SUM(s.hits) + SUM(s.walks) + SUM(s.hit_by_pitch))::DECIMAL /
         NULLIF(SUM(s.at_bats) + SUM(s.walks) + SUM(s.hit_by_pitch) + SUM(s.sacrifice_flies), 0))
        +
        ((SUM(s.singles) + 2 * SUM(s.doubles) + 3 * SUM(s.triples) + 4 * SUM(s.home_runs))::DECIMAL /
         NULLIF(SUM(s.at_bats), 0)),
        3
      ) AS career_ops
    FROM all_batting_seasons s
    JOIN players p ON s.player_id = p.player_id
    WHERE p.first_name = 'Mike'
      AND p.last_name = 'Trout'
    GROUP BY p.player_id, p.first_name, p.last_name

player_career_pitching_totals:
  question: "What are Clayton Kershaw's career pitching totals?"
  sql: |
    SELECT
      p.first_name,
      p.last_name,
      SUM(s.innings_pitched) AS innings_pitched,
      SUM(s.wins) AS wins,
      SUM(s.losses) AS losses,
      SUM(s.saves) AS saves,
      SUM(s.strikeouts) AS strikeouts,
      ROUND((SUM(s.earned_runs) * 9.0) / NULLIF(SUM(s.innings_pitched), 0), 2) AS career_era,
      ROUND((SUM(s.walks_allowed) + SUM(s.hits_allowed))::DECIMAL / NULLIF(SUM(s.innings_pitched), 0), 3) AS career_whip
    FROM all_pitching_seasons s
    JOIN players p ON s.player_id = p.player_id
    WHERE p.first_name = 'Clayton'
      AND p.last_name = 'Kershaw'
    GROUP BY p.player_id, p.first_name, p.last_name


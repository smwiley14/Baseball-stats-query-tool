season_stats_games_played:
  question: "How many regular-season games were played in 2020?"
  sql: |
    SELECT COUNT(*) AS games
    FROM games
    WHERE season = 2020
      AND LOWER(game_type) = 'regular'

streak_consecutive_games_with_hit:
  question: "What is the longest hit streak for Aaron Judge in 2020?"
  sql: |
    WITH player_games AS (
      SELECT
        bs.game_date,
        bs.game_id,
        CASE WHEN bs.hits > 0 THEN 1 ELSE 0 END AS has_hit,
        ROW_NUMBER() OVER (ORDER BY bs.game_date, bs.game_id) AS rn1,
        ROW_NUMBER() OVER (PARTITION BY CASE WHEN bs.hits > 0 THEN 1 ELSE 0 END ORDER BY bs.game_date, bs.game_id) AS rn2
      FROM batting_stats bs
      JOIN players p ON bs.player_id = p.player_id
      JOIN games g ON bs.game_id = g.game_id
      WHERE p.first_name = 'Aaron'
        AND p.last_name = 'Judge'
        AND bs.season = 2020
        AND LOWER(g.game_type) = 'regular'
    ),
    hit_groups AS (
      SELECT
        game_date,
        game_id,
        has_hit,
        rn1 - rn2 AS grp
      FROM player_games
      WHERE has_hit = 1
    )
    SELECT MAX(streak_len) AS longest_hit_streak
    FROM (
      SELECT COUNT(*) AS streak_len
      FROM hit_groups
      GROUP BY grp
    ) s

individual_player_stretch_last_15_games:
  question: "How many hits did Aaron Judge have over his last 15 regular-season games?"
  sql: |
    WITH ranked_games AS (
      SELECT
        bs.player_id,
        bs.game_id,
        bs.game_date,
        bs.hits,
        ROW_NUMBER() OVER (
          PARTITION BY bs.player_id
          ORDER BY bs.game_date DESC, bs.game_id DESC
        ) AS rn
      FROM batting_stats bs
      JOIN players p ON bs.player_id = p.player_id
      JOIN games g ON bs.game_id = g.game_id
      WHERE p.first_name = 'Aaron'
        AND p.last_name = 'Judge'
        AND LOWER(g.game_type) = 'regular'
    )
    SELECT
      player_id,
      COUNT(*) AS games_in_span,
      SUM(hits) AS total_hits
    FROM ranked_games
    WHERE rn <= 15
    GROUP BY player_id

individual_player_stretch_date_range:
  question: "How many strikeouts did Gerrit Cole have between 2020-08-01 and 2020-09-15?"
  sql: |
    SELECT
      p.first_name,
      p.last_name,
      COUNT(DISTINCT ps.game_id) AS games,
      SUM(ps.strikeouts) AS strikeouts,
      SUM(ps.innings_pitched) AS innings_pitched
    FROM pitching_stats ps
    JOIN players p ON ps.player_id = p.player_id
    JOIN games g ON ps.game_id = g.game_id
    WHERE p.first_name = 'Gerrit'
      AND p.last_name = 'Cole'
      AND g.game_date BETWEEN '2020-08-01' AND '2020-09-15'
      AND LOWER(g.game_type) = 'regular'
    GROUP BY p.player_id, p.first_name, p.last_name

player_matchup_batter_vs_pitcher_events:
  question: "How did Aaron Judge perform against Gerrit Cole in regular season games?"
  sql: |
    SELECT
      g.game_date,
      e.game_id,
      e.inning,
      e.event_text,
      e.event_code,
      e.rbi,
      e.outs
    FROM events e
    JOIN players b ON e.batter_id = b.player_id
    JOIN players p ON e.pitcher_id = p.player_id
    JOIN games g ON e.game_id = g.game_id
    WHERE b.first_name = 'Aaron'
      AND b.last_name = 'Judge'
      AND p.first_name = 'Gerrit'
      AND p.last_name = 'Cole'
      AND LOWER(g.game_type) = 'regular'
    ORDER BY g.game_date, e.game_id, e.inning

player_matchup_batter_vs_pitcher_summary:
  question: "What were Aaron Judge's totals against Gerrit Cole?"
  sql: |
    SELECT
      b.first_name || ' ' || b.last_name AS batter_name,
      p.first_name || ' ' || p.last_name AS pitcher_name,
      COUNT(*) FILTER (WHERE e.ab_flag = 'T') AS at_bats,
      COUNT(*) FILTER (WHERE e.hit_code IN (1, 2, 3, 4)) AS hits,
      COUNT(*) FILTER (WHERE e.hit_code = 4) AS home_runs,
      COALESCE(SUM(e.rbi), 0) AS rbis
    FROM events e
    JOIN players b ON e.batter_id = b.player_id
    JOIN players p ON e.pitcher_id = p.player_id
    JOIN games g ON e.game_id = g.game_id
    WHERE b.first_name = 'Aaron'
      AND b.last_name = 'Judge'
      AND p.first_name = 'Gerrit'
      AND p.last_name = 'Cole'
      AND LOWER(g.game_type) = 'regular'
    GROUP BY b.player_id, b.first_name, b.last_name, p.player_id, p.first_name, p.last_name

player_matchups_vs_team_pitching:
  question: "How did Aaron Judge hit against Red Sox pitching in 2020?"
  sql: |
    SELECT
      p.first_name || ' ' || p.last_name AS player_name,
      g.season,
      SUM(bs.at_bats) AS at_bats,
      SUM(bs.hits) AS hits,
      SUM(bs.home_runs) AS home_runs,
      SUM(bs.rbis) AS rbis,
      ROUND(SUM(bs.hits)::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) AS batting_average
    FROM batting_stats bs
    JOIN players p ON bs.player_id = p.player_id
    JOIN games g ON bs.game_id = g.game_id
    JOIN teams t ON t.team_id = CASE
      WHEN bs.team_id = g.home_team_id THEN g.away_team_id
      ELSE g.home_team_id
    END
    WHERE p.first_name = 'Aaron'
      AND p.last_name = 'Judge'
      AND t.name = 'Red Sox'
      AND g.season = 2020
      AND LOWER(g.game_type) = 'regular'
    GROUP BY p.player_id, p.first_name, p.last_name, g.season


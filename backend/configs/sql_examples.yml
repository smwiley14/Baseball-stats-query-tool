single_team_batting_totals:
  question: "What were the Yankees' team batting totals in 2020?"
  sql: |
    SELECT
      t.name AS team_name,
      s.season,
      SUM(s.plate_appearances) AS plate_appearances,
      SUM(s.at_bats) AS at_bats,
      SUM(s.hits) AS hits,
      SUM(s.home_runs) AS home_runs,
      SUM(s.rbis) AS rbis,
      SUM(s.walks) AS walks,
      SUM(s.strikeouts) AS strikeouts,
      ROUND(SUM(s.hits)::DECIMAL / NULLIF(SUM(s.at_bats), 0), 3) AS batting_average,
      ROUND(
        ((SUM(s.hits) + SUM(s.walks) + SUM(s.hit_by_pitch))::DECIMAL /
         NULLIF(SUM(s.at_bats) + SUM(s.walks) + SUM(s.hit_by_pitch) + SUM(s.sacrifice_flies), 0))
        +
        ((SUM(s.singles) + 2 * SUM(s.doubles) + 3 * SUM(s.triples) + 4 * SUM(s.home_runs))::DECIMAL /
         NULLIF(SUM(s.at_bats), 0)),
        3
      ) AS ops
    FROM all_batting_seasons s
    JOIN teams t ON s.team_id = t.team_id
    WHERE t.name = 'Yankees'
      AND s.season = 2020
    GROUP BY t.team_id, t.name, s.season


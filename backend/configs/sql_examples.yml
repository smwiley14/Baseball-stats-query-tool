best_average_in_single_season:
  question: "Best batting average in 2025?"
  sql: |
    SELECT
      bs.player_id,
      p.first_name,
      p.last_name,
      bs.season,
      bs.team_id,
      COUNT(DISTINCT bs.game_id) AS games_played,
      SUM(bs.plate_appearances) AS plate_appearances,
      SUM(bs.at_bats) AS at_bats,
      SUM(bs.runs) AS runs,
      SUM(bs.hits) AS hits,
      SUM(bs.home_runs) AS home_runs,
      SUM(bs.rbis) AS rbis,
      SUM(bs.walks) AS walks,
      SUM(bs.strikeouts) AS strikeouts,
      SUM(bs.stolen_bases) AS stolen_bases,
      ROUND(SUM(bs.hits)::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) AS batting_average,
      ROUND((SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / NULLIF(SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies), 0), 3) AS on_base_percentage,
      ROUND((SUM(bs.singles) + 2 * SUM(bs.doubles) + 3 * SUM(bs.triples) + 4 * SUM(bs.home_runs))::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) AS slugging_percentage,
      ROUND(
        (
          (SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / NULLIF(SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies), 0)
        ) + (
          (SUM(bs.singles) + 2 * SUM(bs.doubles) + 3 * SUM(bs.triples) + 4 * SUM(bs.home_runs))::DECIMAL / NULLIF(SUM(bs.at_bats), 0)
        ),
        3
      ) AS on_base_plus_slugging
    FROM batting_stats bs
    JOIN players p ON bs.player_id = p.player_id
    JOIN games g ON bs.game_id = g.game_id
    WHERE bs.season = 2025
      AND LOWER(g.game_type) = 'regular'
    GROUP BY bs.player_id, p.first_name, p.last_name, bs.season, bs.team_id
    HAVING SUM(bs.plate_appearances) >= 502
    ORDER BY batting_average DESC
    LIMIT 20;

traditional_pitching_output_format_example:
  question: "Show traditional pitching stat lines for top ERA seasons in 2024."
  sql: |
    SELECT
      ps.player_id,
      p.first_name,
      p.last_name,
      ps.season,
      ps.team_id,
      COUNT(DISTINCT ps.game_id) AS games_played,
      SUM(ps.innings_pitched) AS innings_pitched,
      SUM(ps.hits_allowed) AS hits_allowed,
      SUM(ps.home_runs_allowed) AS home_runs_allowed,
      SUM(ps.runs_allowed) AS runs_allowed
    FROM pitching_stats ps
    JOIN players p ON ps.player_id = p.player_id
    JOIN games g ON ps.game_id = g.game_id
    WHERE ps.season = 2024
      AND LOWER(g.game_type) = 'regular'
    GROUP BY ps.player_id, p.first_name, p.last_name, ps.season, ps.team_id
    HAVING SUM(ps.innings_pitched) >= 162
    ORDER BY (SUM(ps.earned_runs) * 9.0) / NULLIF(SUM(ps.innings_pitched), 0) ASC
    LIMIT 20

traditional_batting_output_format_example:
  question: "Show traditional batting stat lines for top OPS seasons in 2024."
  sql: |
    SELECT
      bs.player_id,
      p.first_name,
      p.last_name,
      bs.season,
      bs.team_id,
      COUNT(DISTINCT bs.game_id) AS games_played,
      SUM(bs.plate_appearances) AS plate_appearances,
      SUM(bs.at_bats) AS at_bats,
      SUM(bs.runs) AS runs,
      SUM(bs.hits) AS hits,
      SUM(bs.home_runs) AS home_runs,
      SUM(bs.rbis) AS rbis,
      SUM(bs.walks) AS walks,
      SUM(bs.strikeouts) AS strikeouts,
      SUM(bs.stolen_bases) AS stolen_bases,
      ROUND(SUM(bs.hits)::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) AS batting_average,
      ROUND((SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / NULLIF(SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies), 0), 3) AS on_base_percentage,
      ROUND((SUM(bs.singles) + 2 * SUM(bs.doubles) + 3 * SUM(bs.triples) + 4 * SUM(bs.home_runs))::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) AS slugging_percentage,
      ROUND(
        (
          (SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / NULLIF(SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies), 0)
        ) + (
          (SUM(bs.singles) + 2 * SUM(bs.doubles) + 3 * SUM(bs.triples) + 4 * SUM(bs.home_runs))::DECIMAL / NULLIF(SUM(bs.at_bats), 0)
        ),
        3
      ) AS on_base_plus_slugging
    FROM batting_stats bs
    JOIN players p ON bs.player_id = p.player_id
    JOIN games g ON bs.game_id = g.game_id
    WHERE bs.season = 2024
      AND LOWER(g.game_type) = 'regular'
    GROUP BY bs.player_id, p.first_name, p.last_name, bs.season, bs.team_id
    HAVING SUM(bs.plate_appearances) >= 502
    ORDER BY on_base_plus_slugging DESC
    LIMIT 20

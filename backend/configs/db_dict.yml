DATABASE: retrosheet

SCHEMA: public

TABLE: players
PRIMARY KEYS: player_id
COLUMNS:
  - player_id (VARCHAR(10), NOT NULL)
  - first_name (VARCHAR(50), NULL)
  - last_name (VARCHAR(50), NULL)
  - batting_hand (CHAR(1), NULL)
  - throwing_hand (CHAR(1), NULL)
  - created_at (TIMESTAMP, NULL)
  - updated_at (TIMESTAMP, NULL)


TABLE: games
DESCRIPTION: Comprehensive game information from retrosheet
PRIMARY KEYS: game_id
FOREIGN KEYS:
  - away_finish_pitcher_id -> public.players.player_id
  - away_start_pitcher_id -> public.players.player_id
  - away_team_id -> public.teams.team_id
  - first_base_umpire_id -> public.umpires.umpire_id
  - game_winning_rbi_id -> public.players.player_id
  - home_finish_pitcher_id -> public.players.player_id
  - home_plate_umpire_id -> public.umpires.umpire_id
  - home_start_pitcher_id -> public.players.player_id
  - home_team_id -> public.teams.team_id
  - left_field_umpire_id -> public.umpires.umpire_id
  - losing_pitcher_id -> public.players.player_id
  - park_id -> public.parks.park_id
  - right_field_umpire_id -> public.umpires.umpire_id
  - save_pitcher_id -> public.players.player_id
  - second_base_umpire_id -> public.umpires.umpire_id
  - third_base_umpire_id -> public.umpires.umpire_id
  - winning_pitcher_id -> public.players.player_id
COLUMNS:
  - game_id (VARCHAR(20), NOT NULL)
  - game_date (DATE, NOT NULL)
  - season (INTEGER, NULL)
  - game_number (INTEGER, NULL)
  - day_of_week (VARCHAR(10), NULL)
  - start_time (VARCHAR(10), NULL)
  - daynight (CHAR(1), NULL)
  - dh_flag (CHAR(1), NULL)
  - home_team_id (VARCHAR(5), NULL)
  - away_team_id (VARCHAR(5), NULL)
  - park_id (VARCHAR(10), NULL)
  - home_score (INTEGER, NULL)
  - away_score (INTEGER, NULL)
  - home_hits (INTEGER, NULL)
  - away_hits (INTEGER, NULL)
  - home_errors (INTEGER, NULL)
  - away_errors (INTEGER, NULL)
  - home_lob (INTEGER, NULL)
  - away_lob (INTEGER, NULL)
  - innings (INTEGER, NULL)
  - minutes (INTEGER, NULL)
  - attendance (INTEGER, NULL)
  - temperature (INTEGER, NULL)
  - wind_direction (VARCHAR(10), NULL)
  - wind_speed (INTEGER, NULL)
  - field_condition (VARCHAR(20), NULL)
  - precipitation (VARCHAR(20), NULL)
  - sky (VARCHAR(20), NULL)
  - winning_pitcher_id (VARCHAR(10), NULL)
  - losing_pitcher_id (VARCHAR(10), NULL)
  - save_pitcher_id (VARCHAR(10), NULL)
  - game_winning_rbi_id (VARCHAR(10), NULL)
  - home_start_pitcher_id (VARCHAR(10), NULL)
  - away_start_pitcher_id (VARCHAR(10), NULL)
  - home_finish_pitcher_id (VARCHAR(10), NULL)
  - away_finish_pitcher_id (VARCHAR(10), NULL)
  - home_plate_umpire_id (VARCHAR(10), NULL)
  - first_base_umpire_id (VARCHAR(10), NULL)
  - second_base_umpire_id (VARCHAR(10), NULL)
  - third_base_umpire_id (VARCHAR(10), NULL)
  - left_field_umpire_id (VARCHAR(10), NULL)
  - right_field_umpire_id (VARCHAR(10), NULL)
  - game_type (VARCHAR(20), NULL)
  - forfeit_flag (CHAR(1), NULL)
  - suspend_flag (CHAR(1), NULL)
  - created_at (TIMESTAMP, NULL)
  - updated_at (TIMESTAMP, NULL)


TABLE: teams
PRIMARY KEYS: team_id
COLUMNS:
  - team_id (VARCHAR(5), NOT NULL)
  - league (CHAR(1), NULL)
  - city (VARCHAR(50), NULL)
  - name (VARCHAR(50), NULL)
  - full_name (VARCHAR(100), NULL)
  - created_at (TIMESTAMP, NULL)


TABLE: umpires
PRIMARY KEYS: umpire_id
COLUMNS:
  - umpire_id (VARCHAR(10), NOT NULL)
  - name (VARCHAR(100), NULL)

TABLE: parks
PRIMARY KEYS: park_id
COLUMNS:
  - park_id (VARCHAR(10), NOT NULL)
  - name (VARCHAR(100), NULL)
  - city (VARCHAR(50), NULL)
  - state (VARCHAR(2), NULL)
  - country (VARCHAR(50), NULL)
  - created_at (TIMESTAMP, NULL)


TABLE: rosters
DESCRIPTION: Player-team-season roster information
PRIMARY KEYS: id
FOREIGN KEYS:
  - player_id -> public.players.player_id
  - team_id -> public.teams.team_id
COLUMNS:
  - id (BIGINT, NOT NULL)
  - player_id (VARCHAR(10), NULL)
  - team_id (VARCHAR(5), NULL)
  - season (INTEGER, NOT NULL)
  - position (VARCHAR(10), NULL)

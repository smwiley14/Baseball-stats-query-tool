rate_stat_qualifiers:
  source_url: "https://www.mlb.com/glossary/standard-stats/rate-stats-qualifiers"
  mlb_rule_9_22:
    season_rate_qualifiers:
      batting:
        formula: "minimum_PA = 3.1 * scheduled_league_games"
        rounding: "nearest whole number of plate appearances"
      pitching:
        formula: "minimum_IP = 1.0 * scheduled_league_games"
        rounding: "nearest third of an inning"
    all_time_rate_qualifiers:
      batting:
        - "5000 career at-bats (AL/NL)"
        - "5000 career at-bats (AL/NL + Negro Leagues combined)"
        - "1800 career at-bats (Negro Leagues)"
      pitching:
        - "2000 career innings pitched (AL/NL)"
        - "2000 career innings pitched (AL/NL + Negro Leagues combined)"
        - "600 career innings pitched (Negro Leagues)"
  sql_implementation_guidance:
    - "For season or multi-season rate-stat rankings, compute scheduled games in scope from games table and apply MLB thresholds in HAVING before ORDER BY."
    - "Use qualification filtering only for rate stats (AVG, OBP, SLG, OPS, ERA, WHIP, opponent AVG, etc.), not counting stats."
    - "When data lacks explicit scheduled games, use the best available season-level team-game proxy from games table and state this assumption in sql_explanation."

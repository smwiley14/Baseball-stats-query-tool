playoff_home_run_leaders:
  question: "Who had the most home runs in the playoffs in 2023?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(bs.home_runs) as hr FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) IN (''playoff'', ''divisionseries'', ''lcs'', ''wildcard'', ''worldseries'', ''championship'') JOIN players p ON bs.player_id = p.player_id WHERE g.season = 2023 GROUP BY p.player_id, p.first_name, p.last_name ORDER BY hr DESC LIMIT 10'

world_series_batting_stats:
  question: "What were a player''s batting stats in the World Series in 2022?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(bs.at_bats) as ab, SUM(bs.hits) as h, SUM(bs.home_runs) as hr, SUM(bs.rbis) as rbi, ROUND(SUM(bs.hits)::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) as avg FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''worldseries'' JOIN players p ON bs.player_id = p.player_id WHERE g.season = 2022 AND bs.player_id = ''harpt001'' GROUP BY p.player_id, p.first_name, p.last_name'

postseason_team_wins:
  question: "How many postseason games did the Yankees win in 2020?"
  sql: 'SELECT COUNT(*) as postseason_wins FROM games WHERE season = 2020 AND LOWER(game_type) IN (''playoff'', ''divisionseries'', ''lcs'', ''wildcard'', ''worldseries'', ''championship'') AND (home_team_id = ''NYA'' AND home_score > away_score OR away_team_id = ''NYA'' AND away_score > home_score)'

playoff_pitcher_era:
  question: "What was a pitcher''s ERA in the Division Series in 2023?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND((SUM(ps.earned_runs) * 9.0) / NULLIF(SUM(ps.innings_pitched), 0), 2) as era FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''divisionseries'' JOIN players p ON ps.player_id = p.player_id WHERE g.season = 2023 AND ps.player_id = ''wheaz001'' GROUP BY p.player_id, p.first_name, p.last_name'

# -----------------------------------------------------------------------------
# Sliding / consecutive N-game span (window functions)
# -----------------------------------------------------------------------------

most_walks_consecutive_10_games:
  question: "Who walked the most within any consecutive 10 game span in MLB history?"
  sql: |
    WITH player_games AS (
      SELECT bs.player_id, bs.game_id, bs.game_date, bs.walks,
             ROW_NUMBER() OVER (PARTITION BY bs.player_id ORDER BY bs.game_date, bs.game_id) AS rn
      FROM batting_stats bs
      JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular''
    ),
    spans AS (
      SELECT player_id, rn, game_date AS span_start_date,
             LAST_VALUE(game_date) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 9 FOLLOWING) AS span_end_date,
             SUM(walks) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 9 FOLLOWING) AS walks_in_10_games,
             COUNT(*) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 9 FOLLOWING) AS games_in_span
      FROM player_games
    ),
    valid_spans AS (
      SELECT * FROM spans WHERE games_in_span = 10
    ),
    max_walks AS (
      SELECT MAX(walks_in_10_games) AS max_walks FROM valid_spans
    )
    SELECT p.first_name || '' '' || p.last_name AS player_name, v.span_start_date, v.span_end_date, v.walks_in_10_games AS walks
    FROM valid_spans v
    JOIN players p ON v.player_id = p.player_id
    JOIN max_walks m ON v.walks_in_10_games = m.max_walks
    ORDER BY v.walks_in_10_games DESC

best_era_consecutive_30_starts:
  question: "Who had the best ERA over any consecutive 30 start span in MLB history?"
  sql: |
    WITH pitcher_starts AS (
      SELECT ps.player_id, ps.game_id, ps.game_date, ps.earned_runs, ps.innings_pitched,
             ROW_NUMBER() OVER (PARTITION BY ps.player_id ORDER BY ps.game_date, ps.game_id) AS rn
      FROM pitching_stats ps
      JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular''
      WHERE g.home_start_pitcher_id = ps.player_id OR g.away_start_pitcher_id = ps.player_id
    ),
    spans AS (
      SELECT player_id, rn, game_date AS span_start_date,
             LAST_VALUE(game_date) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 29 FOLLOWING) AS span_end_date,
             SUM(earned_runs) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 29 FOLLOWING) AS er_in_span,
             SUM(innings_pitched) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 29 FOLLOWING) AS ip_in_span,
             COUNT(*) OVER (PARTITION BY player_id ORDER BY rn ROWS BETWEEN CURRENT ROW AND 29 FOLLOWING) AS starts_in_span
      FROM pitcher_starts
    ),
    valid_spans AS (
      SELECT *, ROUND((er_in_span * 9.0) / NULLIF(ip_in_span, 0), 2) AS era
      FROM spans
      WHERE starts_in_span = 30 AND ip_in_span > 0
    ),
    best_era AS (
      SELECT MIN(era) AS min_era FROM valid_spans
    )
    SELECT p.first_name || '' '' || p.last_name AS player_name, v.span_start_date, v.span_end_date, v.era, v.ip_in_span AS innings_pitched
    FROM valid_spans v
    JOIN players p ON v.player_id = p.player_id
    JOIN best_era b ON v.era = b.min_era
    ORDER BY v.era ASC

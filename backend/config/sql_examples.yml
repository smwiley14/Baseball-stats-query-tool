# Simple SQL examples for few-shot learning
# Default: when game type is not specified, restrict to REGULAR SEASON only by joining
# on games.game_id and filtering LOWER(games.game_type) = 'regular'.
# Playoff game_type values: playoff, divisionseries, lcs, wildcard, worldseries, championship, allstar, exhibition.

total_games:
  question: "How many games are there in total?"
  sql: 'SELECT COUNT(*) FROM games WHERE LOWER(game_type) = ''regular'''

total_players:
  question: "How many players are in the database?"
  sql: 'SELECT COUNT(*) FROM players'

total_teams:
  question: "How many teams are there?"
  sql: 'SELECT COUNT(*) FROM teams'

games_in_season:
  question: "How many games were played in the 2020 season?"
  sql: 'SELECT COUNT(*) FROM games WHERE season = 2020 AND LOWER(game_type) = ''regular'''

player_batting_stats_season:
  question: "What are the batting statistics for a specific player in 2020?"
  sql: 'SELECT bs.player_id, SUM(bs.at_bats) as ab, SUM(bs.hits) as h, SUM(bs.home_runs) as hr, SUM(bs.rbis) as rbi FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.season = 2020 AND bs.player_id = ''judga001'' GROUP BY bs.player_id'

top_home_run_hitters:
  question: "Who are the top 10 home run hitters in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(bs.home_runs) as hr FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name ORDER BY hr DESC LIMIT 10'

top_batting_average:
  question: "Who had the highest batting average in 2020 with at least 502 at bats?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND(SUM(bs.hits)::DECIMAL / SUM(bs.at_bats), 3) as avg FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name HAVING SUM(bs.at_bats) >= 502 ORDER BY avg DESC LIMIT 1'

player_career_home_runs:
  question: "How many career home runs does a specific player have?"
  sql: 'SELECT SUM(bs.home_runs) as career_hr FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'''

team_wins_season:
  question: "How many wins did the Yankees have in 2020?"
  sql: 'SELECT COUNT(*) as wins FROM games WHERE season = 2020 AND LOWER(game_type) = ''regular'' AND (home_team_id = ''NYA'' AND home_score > away_score OR away_team_id = ''NYA'' AND away_score > home_score)'

player_season_stats:
  question: "Show me all batting statistics for a player in a specific season"
  sql: 'SELECT SUM(bs.at_bats) as ab, SUM(bs.hits) as h, SUM(bs.singles) as singles, SUM(bs.doubles) as doubles, SUM(bs.triples) as triples, SUM(bs.home_runs) as hr, SUM(bs.rbis) as rbi, SUM(bs.runs) as runs, SUM(bs.walks) as walks, SUM(bs.strikeouts) as strikeouts FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

top_rbi_leaders:
  question: "Who are the top 5 RBI leaders in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(bs.rbis) as rbi FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name ORDER BY rbi DESC LIMIT 5'

pitcher_wins_season:
  question: "Which pitcher had the most wins in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(ps.win::INTEGER) as wins FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON ps.player_id = p.player_id WHERE ps.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name ORDER BY wins DESC LIMIT 1'

pitcher_era_season:
  question: "What is the ERA for a specific pitcher in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND((SUM(ps.earned_runs) * 9.0) / SUM(ps.innings_pitched), 2) as era FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON ps.player_id = p.player_id WHERE ps.season = 2020 AND ps.player_id = ''coleg101'' GROUP BY p.player_id, p.first_name, p.last_name'

top_strikeout_pitchers:
  question: "Who are the top 10 strikeout pitchers in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(ps.strikeouts) as strikeouts FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON ps.player_id = p.player_id WHERE ps.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name ORDER BY strikeouts DESC LIMIT 10'

games_by_team:
  question: "How many games did each team play in 2020?"
  sql: 'SELECT t.name as team_name, COUNT(*) as games FROM games g JOIN teams t ON (g.home_team_id = t.team_id OR g.away_team_id = t.team_id) WHERE g.season = 2020 AND LOWER(g.game_type) = ''regular'' GROUP BY t.team_id, t.name ORDER BY games DESC'

player_ops_season:
  question: "What is the OPS for a player in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND((SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / (SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies)) + (SUM(bs.singles) + 2*SUM(bs.doubles) + 3*SUM(bs.triples) + 4*SUM(bs.home_runs))::DECIMAL / SUM(bs.at_bats), 3) as ops FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 AND bs.player_id = ''judga001'' GROUP BY p.player_id, p.first_name, p.last_name'

career_batting_stats:
  question: "What are the career batting statistics for a player?"
  sql: 'SELECT p.player_id, p.first_name, p.last_name, SUM(bs.at_bats) as career_ab, SUM(bs.hits) as career_h, SUM(bs.home_runs) as career_hr, SUM(bs.rbis) as career_rbi, ROUND(SUM(bs.hits)::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) as career_avg FROM players p LEFT JOIN (batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'') ON p.player_id = bs.player_id WHERE p.player_id = ''judga001'' GROUP BY p.player_id, p.first_name, p.last_name'

career_pitching_stats:
  question: "What are the career pitching statistics for a player?"
  sql: 'SELECT p.player_id, p.first_name, p.last_name, SUM(ps.innings_pitched) as career_ip, SUM(ps.strikeouts) as career_k, SUM(ps.win::INTEGER) as career_wins, SUM(ps.loss::INTEGER) as career_losses, ROUND((SUM(ps.earned_runs) * 9.0) / NULLIF(SUM(ps.innings_pitched), 0), 2) as career_era FROM players p LEFT JOIN (pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'') ON p.player_id = ps.player_id WHERE p.player_id = ''coleg101'' GROUP BY p.player_id, p.first_name, p.last_name'

season_batting_leaders:
  question: "Who are the batting average leaders for 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(bs.at_bats) as ab, SUM(bs.hits) as h, SUM(bs.home_runs) as hr, SUM(bs.rbis) as rbi, ROUND(SUM(bs.hits)::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) as avg, ROUND((SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / NULLIF(SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies), 0), 3) as obp, ROUND((SUM(bs.singles) + 2*SUM(bs.doubles) + 3*SUM(bs.triples) + 4*SUM(bs.home_runs))::DECIMAL / NULLIF(SUM(bs.at_bats), 0), 3) as slg FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name HAVING SUM(bs.at_bats) >= 502 ORDER BY avg DESC LIMIT 10'

season_pitching_leaders:
  question: "Who are the ERA leaders for 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, SUM(ps.innings_pitched) as ip, SUM(ps.hits_allowed) as h, SUM(ps.home_runs_allowed) as hr, SUM(ps.earned_runs) as er, SUM(ps.walks_allowed) as w, SUM(ps.strikeouts) as k, ROUND((SUM(ps.earned_runs) * 9.0) / NULLIF(SUM(ps.innings_pitched), 0), 2) as era, ROUND((SUM(ps.walks_allowed) + SUM(ps.hits_allowed))::DECIMAL / NULLIF(SUM(ps.innings_pitched), 0), 2) as whip FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON ps.player_id = p.player_id WHERE ps.season = 2020 GROUP BY p.player_id, p.first_name, p.last_name HAVING SUM(ps.innings_pitched) >= 162 ORDER BY era ASC LIMIT 10'

player_team_season:
  question: "Which team did a player play for in 2020?"
  sql: 'SELECT t.name as team_name FROM rosters r JOIN teams t ON r.team_id = t.team_id WHERE r.player_id = ''judga001'' AND r.season = 2020'

home_runs_by_month:
  question: "How many home runs were hit in each month of 2020?"
  sql: 'SELECT EXTRACT(MONTH FROM bs.game_date) as month, SUM(bs.home_runs) as home_runs FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.season = 2020 GROUP BY EXTRACT(MONTH FROM bs.game_date) ORDER BY month'

games_at_park:
  question: "How many games were played at a specific ballpark in 2020?"
  sql: 'SELECT COUNT(*) as games FROM games WHERE park_id = ''NYC20'' AND season = 2020 AND LOWER(game_type) = ''regular'''

player_stolen_bases:
  question: "How many stolen bases did a player have in 2020?"
  sql: 'SELECT SUM(bs.stolen_bases) as stolen_bases FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

team_batting_average:
  question: "What was the team batting average for the Yankees in 2020?"
  sql: 'SELECT ROUND(SUM(bs.hits)::DECIMAL / SUM(bs.at_bats), 3) as team_avg FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.team_id = ''NYA'' AND bs.season = 2020'

complete_games_pitched:
  question: "How many complete games did a pitcher throw in 2020?"
  sql: 'SELECT SUM(ps.complete_game::INTEGER) as complete_games FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE ps.player_id = ''coleg101'' AND ps.season = 2020'

player_walks_season:
  question: "How many walks did a player draw in 2020?"
  sql: 'SELECT SUM(bs.walks) as walks FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

pitcher_saves:
  question: "How many saves did a pitcher have in 2020?"
  sql: 'SELECT SUM(ps.save::INTEGER) as saves FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE ps.player_id = ''coleg101'' AND ps.season = 2020'

player_strikeouts_batting:
  question: "How many times did a player strike out in 2020?"
  sql: 'SELECT SUM(bs.strikeouts) as strikeouts FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

games_on_date:
  question: "How many games were played on a specific date?"
  sql: 'SELECT COUNT(*) as games FROM games WHERE game_date = ''2020-07-23'' AND LOWER(game_type) = ''regular'''

player_hits_by_type:
  question: "How many singles, doubles, triples, and home runs did a player have in 2020?"
  sql: 'SELECT SUM(bs.singles) as singles, SUM(bs.doubles) as doubles, SUM(bs.triples) as triples, SUM(bs.home_runs) as home_runs FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

pitcher_whip:
  question: "What is the WHIP for a pitcher in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND((SUM(ps.walks_allowed) + SUM(ps.hits_allowed))::DECIMAL / SUM(ps.innings_pitched), 2) as whip FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON ps.player_id = p.player_id WHERE ps.season = 2020 AND ps.player_id = ''coleg101'' GROUP BY p.player_id, p.first_name, p.last_name'

player_obp_season:
  question: "What is the on-base percentage for a player in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND((SUM(bs.hits) + SUM(bs.walks) + SUM(bs.hit_by_pitch))::DECIMAL / (SUM(bs.at_bats) + SUM(bs.walks) + SUM(bs.hit_by_pitch) + SUM(bs.sacrifice_flies)), 3) as obp FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 AND bs.player_id = ''judga001'' GROUP BY p.player_id, p.first_name, p.last_name'

player_slg_season:
  question: "What is the slugging percentage for a player in 2020?"
  sql: 'SELECT p.first_name || '' '' || p.last_name as player_name, ROUND((SUM(bs.singles) + 2*SUM(bs.doubles) + 3*SUM(bs.triples) + 4*SUM(bs.home_runs))::DECIMAL / SUM(bs.at_bats), 3) as slg FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' JOIN players p ON bs.player_id = p.player_id WHERE bs.season = 2020 AND bs.player_id = ''judga001'' GROUP BY p.player_id, p.first_name, p.last_name'

team_home_runs:
  question: "How many home runs did the Yankees hit in 2020?"
  sql: 'SELECT SUM(bs.home_runs) as home_runs FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.team_id = ''NYA'' AND bs.season = 2020'

player_games_played:
  question: "How many games did a player play in 2020?"
  sql: 'SELECT COUNT(DISTINCT bs.game_id) as games_played FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

pitcher_innings_pitched:
  question: "How many innings did a pitcher throw in 2020?"
  sql: 'SELECT SUM(ps.innings_pitched) as innings_pitched FROM pitching_stats ps JOIN games g ON ps.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE ps.player_id = ''coleg101'' AND ps.season = 2020'

player_runs_scored:
  question: "How many runs did a player score in 2020?"
  sql: 'SELECT SUM(bs.runs) as runs FROM batting_stats bs JOIN games g ON bs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE bs.player_id = ''judga001'' AND bs.season = 2020'

double_plays_turned:
  question: "How many double plays did a player turn in 2020?"
  sql: 'SELECT SUM(fs.double_plays) as double_plays FROM fielding_stats fs JOIN games g ON fs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE fs.player_id = ''judga001'' AND fs.season = 2020'

player_fielding_percentage:
  question: "What is the fielding percentage for a player at a specific position in 2020?"
  sql: 'SELECT ROUND((SUM(fs.putouts) + SUM(fs.assists))::DECIMAL / (SUM(fs.putouts) + SUM(fs.assists) + SUM(fs.errors)), 3) as fielding_percentage FROM fielding_stats fs JOIN games g ON fs.game_id = g.game_id AND LOWER(g.game_type) = ''regular'' WHERE fs.player_id = ''judga001'' AND fs.position = 6 AND fs.season = 2020'

